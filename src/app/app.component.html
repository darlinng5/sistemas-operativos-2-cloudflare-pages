<div class="cf-app">
  <app-navbar />
<h2 style="text-align: center; color: #f63; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999;">
  ¡Tarea Con Exitoso! 
</h2>

  @if (loadError()) {
    <p class="cf-load-error">
      Couldn't load Cloudflare location data. Please refresh the page.
    </p>
  }

  <main class="cf-main">
    <section class="cf-explorer-grid">
      <div class="cf-map-column">
        <app-cf-map />
      </div>
      <aside class="cf-sidebar-column">
        <app-cf-search />
        <app-cf-stats />
      </aside>
    </section>

    <app-how-it-works />
    <app-your-connection />
  </main>
</div>
